# Deploy Spring Boot agentic API to Azure App Service (ai-rag-agentic-ai).
# Same Service Principal pattern as AiDecisionMakingBackend deploy-backend.yml.
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Secrets (required):
#   AZURE_CREDENTIALS
#     JSON: { "clientId", "clientSecret", "tenantId", "subscriptionId" }
#     Use the SAME secret as AiDecisionMakingBackend (SP needs Contributor on ai-rag-rg-1).
#
# App Service → Configuration (Portal; not in git):
#   SPRING_DATASOURCE_* / AZURE_SQL_*
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_CHAT_DEPLOYMENT=ai-rag-agentic-ai
#   APP_RAG_API_BASE_URL=https://<ai-rag-webapp>.azurewebsites.net
#   CORS_ORIGINS=https://yellow-island-0fefe051e.7.azurestaticapps.net,http://localhost:5174

name: Deploy Agentic API (ai-rag-agentic-ai)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/deploy-agentic-appservice.yml"

env:
  AZURE_WEBAPP_NAME: ai-rag-agentic-ai
  AZURE_RESOURCE_GROUP: ai-rag-rg-1
  AZURE_SUBSCRIPTION_ID: 2c251dc2-c15f-4b57-850c-35d612aff22b
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: ./mvnw clean package -DskipTests -B

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select subscription and verify App Service
        run: |
          set -euo pipefail
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          echo "Active subscription:"
          az account show --query "{name:name, id:id}" -o tsv
          echo "Target web app:"
          az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "{name:name, state:state, host:defaultHostName}" -o json

      - name: Deploy JAR to Azure App Service
        run: |
          set -euo pipefail
          JAR=$(ls backend/target/*.jar | head -1)
          echo "Deploying $JAR to ${{ env.AZURE_WEBAPP_NAME }}"
          az webapp deploy \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --src-path "$JAR" \
            --type jar \
            --async false

      - name: Azure logout
        if: always()
        run: az logout || true
