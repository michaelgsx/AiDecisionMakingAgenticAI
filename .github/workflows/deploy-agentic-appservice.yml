# Deploy Spring Boot agentic API to Azure App Service (ai-rag-agentic-ai).
# Same pattern as AiDecisionMakingBackend deploy-backend.yml.
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Secrets (required):
#   AZURE_CREDENTIALS
#     JSON: { "clientId", "clientSecret", "tenantId", "subscriptionId" }
#     SP needs Website Contributor on ai-rag-agentic-ai (same as ai-rag-webapp).
#
# Deploy ONLY via this workflow (push to v1/main or workflow_dispatch).
# Do not use local `az webapp deploy` — corrupted partial uploads cause startup failures
# (ClassNotFoundException + EOFException on AgenticApplication = truncated app.jar).
#
# App Service → Configuration (Portal; not in git):
#   SPRING_DATASOURCE_* / AZURE_SQL_*
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_CHAT_DEPLOYMENT=ai-rag-agentic-ai
#   APP_RAG_API_BASE_URL=https://<ai-rag-webapp>.azurewebsites.net
#   CORS_ORIGINS=https://yellow-island-0fefe051e.7.azurestaticapps.net,http://localhost:5174
#   WEBSITES_PORT=80 (Azure Java SE sets -Dserver.port=80; set once in Portal — workflow only verifies idempotently)

name: Deploy Agentic API (ai-rag-agentic-ai)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/deploy-agentic-appservice.yml"

env:
  AZURE_WEBAPP_NAME: ai-rag-agentic-ai
  AZURE_RESOURCE_GROUP: ai-rag-rg-1
  AZURE_SUBSCRIPTION_ID: 2c251dc2-c15f-4b57-850c-35d612aff22b
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-ai-rag-agentic-ai
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: ./mvnw clean package -DskipTests -B

      - name: Verify deploy JAR integrity
        id: jar
        working-directory: backend
        run: |
          set -euo pipefail
          JAR=$(ls -1 target/*.jar | grep -v '\.original$' | head -1)
          if [ -z "$JAR" ]; then
            echo "No executable JAR found under backend/target" >&2
            exit 1
          fi
          echo "Artifact: $JAR ($(wc -c < "$JAR") bytes)"
          unzip -t "$JAR"
          jar tf "$JAR" | grep -q 'BOOT-INF/classes/com/aidecision/agentic/AgenticApplication.class'
          echo "path=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select subscription and verify App Service
        run: |
          set -euo pipefail
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "{name:name, state:state, host:defaultHostName, startup:siteConfig.appCommandLine}" -o json

      - name: Clear custom startup command (Java SE auto-detects app.jar)
        run: |
          set -euo pipefail
          az rest --method PATCH \
            --url "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.AZURE_WEBAPP_NAME }}/config/web?api-version=2023-12-01" \
            --body '{"properties":{"appCommandLine":""}}'

      - name: Wait for prior deployment lock to clear
        run: |
          set -euo pipefail
          SCM_HOST=$(az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "enabledHostNames[?contains(@, '.scm.')] | [0]" -o tsv)
          if [ -z "$SCM_HOST" ]; then
            echo "Could not resolve SCM host; continuing." >&2
            exit 0
          fi
          TOKEN=$(az account get-access-token --resource https://appservice.azure.com --query accessToken -o tsv)

          fetch_latest_complete() {
            local resp http body
            resp=$(curl -sS --max-time 30 -w "\n%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "https://${SCM_HOST}/api/deployments/latest") || return 1
            http=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [ "$http" = "404" ]; then
              echo "true"
              return 0
            fi
            if [ "$http" != "200" ]; then
              echo "SCM /api/deployments/latest returned HTTP $http" >&2
              return 1
            fi
            printf '%s' "$body" | jq -r '.complete // false'
          }

          for i in $(seq 1 10); do
            if COMPLETE=$(fetch_latest_complete); then
              if [ "$COMPLETE" = "true" ]; then
                echo "No deployment lock (attempt $i)."
                exit 0
              fi
              echo "Deployment still in progress (attempt $i/10); waiting 15s..."
            else
              echo "SCM unreachable on attempt $i/10; waiting 15s..."
            fi
            sleep 15
          done

          echo "Timed out waiting for SCM lock; restarting app to clear stale OneDeploy state..."
          az webapp restart \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}"
          sleep 45
          if COMPLETE=$(fetch_latest_complete) && [ "$COMPLETE" = "true" ]; then
            echo "Lock cleared after restart."
            exit 0
          fi
          echo "Deployment lock still present after restart; aborting to avoid corrupt JAR upload." >&2
          exit 1

      - name: Deploy JAR to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_RESOURCE_GROUP }}
          package: backend/target/${{ steps.jar.outputs.path }}

      - name: Ensure WEBSITES_PORT is 80 (no restart — OneDeploy already restarted)
        run: |
          set -euo pipefail
          CURRENT=$(az webapp config appsettings list \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[?name=='WEBSITES_PORT'].value | [0]" -o tsv)
          if [ "$CURRENT" = "80" ]; then
            echo "WEBSITES_PORT already 80; skipping."
          else
            echo "Setting WEBSITES_PORT=80 (was: ${CURRENT:-unset})"
            az webapp config appsettings set \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --settings WEBSITES_PORT=80 \
              --output none
          fi

      - name: Smoke test /health
        run: |
          set -euo pipefail
          HOST=$(az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query defaultHostName -o tsv)
          URL="https://${HOST}/health"
          echo "Waiting for ${URL} (App Service cold start can take several minutes)..."
          for i in $(seq 1 30); do
            if curl -fsS --max-time 15 "$URL" >/dev/null 2>&1; then
              echo "Health OK after ${i} attempt(s)"
              curl -fsS "$URL"
              exit 0
            fi
            echo "Attempt ${i}/30 — not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "Health check failed after 7.5 minutes" >&2
          exit 1

      - name: Azure logout
        if: always()
        run: az logout || true
