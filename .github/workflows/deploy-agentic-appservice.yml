# Deploy Spring Boot agentic API to Azure App Service (ai-rag-agentic-ai).
# Same pattern as AiDecisionMakingBackend deploy-backend.yml.
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Secrets (required):
#   AZURE_CREDENTIALS
#     JSON: { "clientId", "clientSecret", "tenantId", "subscriptionId" }
#     SP needs Website Contributor on ai-rag-agentic-ai (same as ai-rag-webapp).
#
# App Service → Configuration (Portal; not in git):
#   SPRING_DATASOURCE_* / AZURE_SQL_*
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_CHAT_DEPLOYMENT=ai-rag-agentic-ai
#   APP_RAG_API_BASE_URL=https://<ai-rag-webapp>.azurewebsites.net
#   CORS_ORIGINS=https://yellow-island-0fefe051e.7.azurestaticapps.net,http://localhost:5174

name: Deploy Agentic API (ai-rag-agentic-ai)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/deploy-agentic-appservice.yml"

env:
  AZURE_WEBAPP_NAME: ai-rag-agentic-ai
  AZURE_RESOURCE_GROUP: ai-rag-rg-1
  AZURE_SUBSCRIPTION_ID: 2c251dc2-c15f-4b57-850c-35d612aff22b
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-ai-rag-agentic-ai
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: ./mvnw clean package -DskipTests -B

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select subscription and verify App Service
        run: |
          set -euo pipefail
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "{name:name, state:state, host:defaultHostName, startup:siteConfig.appCommandLine}" -o json

      - name: Clear custom startup command (Java SE auto-detects app.jar)
        run: |
          set -euo pipefail
          az rest --method PATCH \
            --url "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.AZURE_WEBAPP_NAME }}/config/web?api-version=2023-12-01" \
            --body '{"properties":{"appCommandLine":""}}'

      - name: Deploy JAR to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_RESOURCE_GROUP }}
          package: backend/target/*.jar

      - name: Azure logout
        if: always()
        run: az logout || true
