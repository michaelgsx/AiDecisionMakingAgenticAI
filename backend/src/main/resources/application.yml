server:
  port: ${PORT:8788}

spring:
  application:
    name: ai-rag-agentic-ai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://${AZURE_SQL_SERVER:ai-rag-sql-server.database.windows.net}:${AZURE_SQL_PORT:1433};databaseName=${AZURE_SQL_DATABASE:ai-rag-db-1};encrypt=true;trustServerCertificate=false;loginTimeout=30}
    username: ${SPRING_DATASOURCE_USERNAME:${AZURE_SQL_USER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${AZURE_SQL_PASSWORD:}}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      # The executor invokes tools over HTTP loopback, so a single step transiently holds the
      # step's own connection plus the connection the in-app tool endpoint uses. Size the pool
      # for that doubling and fail fast (rather than hang) if a connection cannot be acquired.
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:20000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1200000}
  jpa:
    # Disabled: open-in-view keeps an EntityManager (and its DB connection) bound to every request
    # for its full duration. With loopback tool HTTP calls that needlessly pins connections and can
    # starve the orchestrator's scheduler thread; we never lazy-load outside a transaction.
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        # Cap every JDBC statement (seconds). A loopback tool step holds its row lock across the
        # HTTP call, so an unlucky reader could otherwise block forever; instead it fails and retries.
        jdbc:
          timeout: ${DB_STATEMENT_TIMEOUT_SEC:45}

app:
  ops-token: ${OPS_TOKEN:}
  cors-origins: ${CORS_ORIGINS:http://localhost:5174,https://*.azurestaticapps.net}
  rag-api:
    base-url: ${APP_RAG_API_BASE_URL:${RAG_API_BASE_URL:}}
    ops-token: ${APP_RAG_API_OPS_TOKEN:${RAG_API_OPS_TOKEN:${OPS_TOKEN:}}}
    assess-path: /rag/assess
  orchestrator:
    max-steps-per-workflow: 20
    worker-poll-interval-ms: 2000
    default-step-max-time-ms: 30000
    default-step-timeout-ms: 120000
    invoke-tools-over-http: ${ORCH_INVOKE_TOOLS_OVER_HTTP:true}
    tool-base-url: ${ORCH_TOOL_BASE_URL:http://localhost:${PORT:8788}}
  azure-openai:
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_API_KEY:}
    chat-deployment: ${AZURE_OPENAI_CHAT_DEPLOYMENT:gpt-5.4-mini}
    chat-api-version: ${AZURE_OPENAI_CHAT_API_VERSION:}
    api-version: ${AZURE_OPENAI_API_VERSION:2024-02-01}
    skip-chat: ${AZURE_OPENAI_SKIP_CHAT:false}
